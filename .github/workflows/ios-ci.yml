name: iOS CI

on:
  push:
    branches:
      - main
      - develop
      - '**'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  test:
    name: Build
    runs-on: [self-hosted, macos, x86-64]
    env:
      SCHEME_NAME: TinyMeet-Staging
      PROJECT_PATH: TinyMeet.xcodeproj
      RUNNER_PASSWORD: ${{ secrets.RUNNER_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          echo $RUNNER_PASSWORD | sudo -S xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Swift syntax check
        run: |
          find . -name "*.swift" -exec swift -parse {} + 2>&1 | head -20

      - name: Xcode build note
        run: echo "Build manually in Xcode GUI: open -a Xcode"