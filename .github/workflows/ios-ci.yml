name: iOS CI
# Auto-trigger

on:
  push:
    branches:
      - main
      - develop
      - '**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    name: Test
    runs-on: [self-hosted, macos, x86-64]
    env:
      BUNDLE_PATH: vendor/bundle
      FASTLANE_SKIP_UPDATE_CHECK: "1"
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
      HOMEBREW_NO_AUTO_UPDATE: "1"
      SCHEME_NAME: TinyMeet-Staging
      PROJECT_PATH: TinyMeet.xcodeproj
      DESTINATION: generic/platform=iOS

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Ruby gems
        uses: actions/cache@v4
        with:
          path: vendor/bundle
          key: bundler-v1-${{ hashFiles('Gemfile') }}
          restore-keys: bundler-v1-

      - name: Install Ruby gems
        run: |
          bundle config set path "$BUNDLE_PATH"
          bundle install

- name: Install SwiftLint
        run: |
          curl -sL https://github.com/realm/SwiftLint/releases/download/0.57.0/portable_swiftlint.zip -o swiftlint.zip
          unzip -o swiftlint.zip
          chmod +x swiftlint
          ./swiftlint version

      - name: SwiftLint check
        run: ./swiftlint lint --strict --config .swiftlint.yml

      - name: Xcode staging build check
        run: |
          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME_NAME" \
            -destination "$DESTINATION" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Run Fastlane staging unit-test lane
        run: bundle exec fastlane ios tests

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test_output
          path: fastlane/test_output