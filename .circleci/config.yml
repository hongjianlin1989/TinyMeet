version: 2.1

jobs:
  test:
    macos:
      xcode: "16.2.0"
    resource_class: m4pro.medium
    working_directory: ~/project
    environment:
      BUNDLE_PATH: vendor/bundle
      FASTLANE_SKIP_UPDATE_CHECK: "1"
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
      HOMEBREW_NO_AUTO_UPDATE: "1"
      SCHEME_NAME: TinyMeet
      PROJECT_PATH: TinyMeet.xcodeproj
      DESTINATION: generic/platform=iOS Simulator

    steps:
      - checkout

      - restore_cache:
          keys:
            - bundler-v1-{{ checksum "Gemfile" }}
            - bundler-v1-

      - run:
          name: Install Ruby gems
          command: |
            bundle config set path "$BUNDLE_PATH"
            bundle install

      - save_cache:
          key: bundler-v1-{{ checksum "Gemfile" }}
          paths:
            - vendor/bundle

      - run:
          name: Install SwiftLint
          command: |
            brew install swiftlint
            swiftlint version

      - run:
          name: Show Xcode version
          command: xcodebuild -version

      - run:
          name: SwiftLint check
          command: swiftlint lint --strict --config .swiftlint.yml

      - run:
          name: Xcode build check
          command: |
            xcodebuild \
              -project "$PROJECT_PATH" \
              -scheme "$SCHEME_NAME" \
              -destination "$DESTINATION" \
              CODE_SIGNING_ALLOWED=NO \
              build

      - run:
          name: Run Fastlane unit-test lane
          command: bundle exec fastlane ios tests

      - store_test_results:
          path: fastlane/test_output

      - store_artifacts:
          path: fastlane/test_output

workflows:
  version: 2
  pull-request-and-branch-validation:
    jobs:
      - test
